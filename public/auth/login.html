<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — KEMPY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050708;
  --bg-2: #0a0d10;
  --surface: #0e1316;
  --surface-2: #131a1e;
  --border: #1a2329;
  --border-cyan: #1e3a44;
  --cyan: #00e5ff;
  --cyan-glow: #00e5ff40;
  --cyan-dim: #4ad4e4;
  --green: #00ff9d;
  --amber: #ffb800;
  --red: #ff4d6d;
  --text: #e6f1f5;
  --text-dim: #8a9ba3;
  --text-muted: #5a6970;
  --font-sans: 'Sora', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --font-display: 'Archivo Black', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-weight: 400;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* Atmospheric background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,229,255,0.10), transparent 60%),
    radial-gradient(ellipse 50% 30% at 10% 110%, rgba(0,255,157,0.05), transparent 60%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='4' height='4'><circle cx='1' cy='1' r='0.5' fill='%23ffffff' opacity='0.015'/></svg>");
  pointer-events: none;
  z-index: 0;
}

.back-home {
  position: fixed;
  top: 24px;
  left: 24px;
  z-index: 10;
  color: var(--text-muted);
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.5px;
  transition: color 0.15s;
}
.back-home:hover { color: var(--cyan); }

.auth-shell {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 20px 40px;
  position: relative;
  z-index: 1;
}

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 420px;
  position: relative;
  overflow: hidden;
}
/* Subtle gradient border accent */
.auth-card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 16px;
  padding: 1px;
  background: linear-gradient(135deg, rgba(0,229,255,0.35), transparent 50%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.auth-brand {
  font-family: var(--font-display);
  font-size: 24px;
  letter-spacing: -1px;
  color: var(--cyan);
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
  text-decoration: none;
}
.auth-brand::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 12px var(--green);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 12px var(--green); }
  50% { box-shadow: 0 0 6px var(--green), 0 0 0 4px rgba(0,255,157,0.08); }
}

.auth-card h1 {
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: 6px;
}
.auth-card h1 .accent { color: var(--cyan); }
.auth-card .sub {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 28px;
}

.form { display: flex; flex-direction: column; gap: 14px; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
}
.field input {
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 14px;
  border-radius: 8px;
  font-family: var(--font-sans);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input::placeholder { color: var(--text-muted); }
.field input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.12);
}
.field input:invalid:not(:placeholder-shown) {
  border-color: rgba(255,77,109,0.4);
}

.field-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
}
.field-row a {
  color: var(--text-dim);
  text-decoration: none;
  font-family: var(--font-mono);
}
.field-row a:hover { color: var(--cyan); }

.error-box {
  background: rgba(255,77,109,0.08);
  border: 1px solid rgba(255,77,109,0.25);
  color: var(--red);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
}
.error-box.show { display: block; }

.auth-submit {
  background: var(--cyan);
  color: var(--bg);
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 0.2px;
  transition: background 0.15s, box-shadow 0.15s, transform 0.05s;
  margin-top: 6px;
}
.auth-submit:hover { background: var(--cyan-dim); box-shadow: 0 0 28px var(--cyan-glow); }
.auth-submit:active { transform: translateY(1px); }
.auth-submit:disabled { opacity: 0.6; cursor: wait; box-shadow: none; }

.preview-note {
  margin-top: 18px;
  padding: 10px 12px;
  background: rgba(255,184,0,0.06);
  border: 1px solid rgba(255,184,0,0.18);
  border-radius: 8px;
  font-size: 11.5px;
  color: var(--text-dim);
  line-height: 1.5;
  font-family: var(--font-mono);
}
.preview-note .badge {
  display: inline-block;
  color: var(--amber);
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-right: 6px;
}

.auth-footer {
  margin-top: 22px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}
.auth-footer a {
  color: var(--cyan);
  text-decoration: none;
  font-weight: 500;
}
.auth-footer a:hover { text-decoration: underline; text-underline-offset: 3px; }

@media (max-width: 480px) {
  .auth-card { padding: 28px 22px; }
  .auth-card h1 { font-size: 22px; }
  .back-home { top: 14px; left: 14px; }
}
</style>
  <link rel="stylesheet" href="/assets/css/theme.css" />
  <script>(function(){try{var t=localStorage.getItem('kempy-theme');if(t!=='light'&&t!=='dark'){t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
</head>
<body>

<a href="/" class="back-home">← Back to home</a>

<div class="auth-shell">
  <div class="auth-card">
    <a href="/" class="auth-brand">KEMPY</a>

    <h1>Welcome <span class="accent">back</span>.</h1>
    <p class="sub">Log in to continue to your workspace.</p>

    <form class="form" id="login-form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required autofocus />
      </div>

      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <a href="#" tabindex="-1" title="Forgot password flow coming soon">Forgot?</a>
        </div>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required minlength="6" />
      </div>

      <div class="error-box" id="error"></div>

      <button type="submit" class="auth-submit" id="submit-btn">Log in</button>
    </form>

    <div class="preview-note">
      <span class="badge">PREVIEW</span>
      Accounts are stored locally in this browser until real authentication is wired up. Any email + password will work.
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="/auth/signup.html">Sign up</a>
    </div>
  </div>
</div>

<script>
const form = document.getElementById('login-form');
const errorEl = document.getElementById('error');
const submitBtn = document.getElementById('submit-btn');

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.add('show');
}
function clearError() {
  errorEl.classList.remove('show');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearError();

  const data = Object.fromEntries(new FormData(form));
  if (!data.email || !data.password) {
    showError('Please fill in both fields.');
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) {
    showError("That doesn't look like a valid email.");
    return;
  }
  if (data.password.length < 6) {
    showError('Password must be at least 6 characters.');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in…';

  // 1. Try the real backend (will 404 until auth routes are built)
  let usedRealApi = false;
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: data.email, password: data.password }),
    });
    if (r.ok) usedRealApi = true;
  } catch (_) {}

  // 2. Preview-mode fallback: store user locally
  if (!usedRealApi) {
    const user = {
      email: data.email,
      name: data.email.split('@')[0],
      role: 'owner',
      loggedInAt: new Date().toISOString(),
      preview: true,
    };
    localStorage.setItem('kempy_user_local', JSON.stringify(user));
  }

  // 3. Redirect into the app
  const next = new URL(window.location).searchParams.get('next') || '/app/dashboard.html';
  window.location.href = next;
});
</script>

<script src="/assets/js/theme.js"></script>
</body>
</html>
