<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password — KEMPY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050708;
  --bg-2: #0a0d10;
  --surface: #0e1316;
  --surface-2: #131a1e;
  --border: #1a2329;
  --border-cyan: #1e3a44;
  --cyan: #00e5ff;
  --cyan-glow: #00e5ff40;
  --cyan-dim: #4ad4e4;
  --green: #00ff9d;
  --amber: #ffb800;
  --red: #ff4d6d;
  --text: #e6f1f5;
  --text-dim: #8a9ba3;
  --text-muted: #5a6970;
  --font-sans: 'Sora', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --font-display: 'Archivo Black', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-weight: 400;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,229,255,0.10), transparent 60%),
    radial-gradient(ellipse 50% 30% at 10% 110%, rgba(0,255,157,0.05), transparent 60%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='4' height='4'><circle cx='1' cy='1' r='0.5' fill='%23ffffff' opacity='0.015'/></svg>");
  pointer-events: none;
  z-index: 0;
}

.back-home {
  position: fixed;
  top: 24px;
  left: 24px;
  z-index: 10;
  color: var(--text-muted);
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.5px;
  transition: color 0.15s;
}
.back-home:hover { color: var(--cyan); }

.auth-shell {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 20px 40px;
  position: relative;
  z-index: 1;
}

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 440px;
  position: relative;
  overflow: hidden;
}
.auth-card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 16px;
  padding: 1px;
  background: linear-gradient(135deg, rgba(0,229,255,0.35), transparent 50%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.auth-brand {
  font-family: var(--font-display);
  font-size: 24px;
  letter-spacing: -1px;
  color: var(--cyan);
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
  text-decoration: none;
}

.auth-card h1 {
  font-family: var(--font-display);
  font-size: 24px;
  letter-spacing: -1px;
  line-height: 1.15;
  margin-bottom: 6px;
}
.auth-card h1 .accent { color: var(--cyan); }
.auth-card .sub {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 26px;
  line-height: 1.55;
}
.auth-card .sub .email { color: var(--cyan); font-family: var(--font-mono); font-size: 13px; word-break: break-all; }

.form { display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
}
.field input {
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 14px;
  border-radius: 8px;
  font-family: var(--font-sans);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input.code-input {
  font-family: var(--font-mono);
  letter-spacing: 8px;
  text-align: center;
  font-size: 20px;
}
.field input::placeholder { color: var(--text-muted); letter-spacing: normal; }
.field input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.12);
}

.error-box {
  background: rgba(255,77,109,0.08);
  border: 1px solid rgba(255,77,109,0.25);
  color: var(--red);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
}
.error-box.show { display: block; }

.ok-box {
  background: rgba(0,255,157,0.07);
  border: 1px solid rgba(0,255,157,0.22);
  color: var(--green);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
}
.ok-box.show { display: block; }

.auth-submit {
  background: var(--cyan);
  color: var(--bg);
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 0.2px;
  transition: background 0.15s, box-shadow 0.15s, transform 0.05s;
  margin-top: 6px;
}
.auth-submit:hover { background: var(--cyan-dim); box-shadow: 0 0 28px var(--cyan-glow); }
.auth-submit:active { transform: translateY(1px); }
.auth-submit:disabled { opacity: 0.6; cursor: wait; box-shadow: none; }

.resend-row {
  margin-top: 20px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.3px;
}
.resend-row button {
  background: none;
  border: none;
  color: var(--cyan);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 0;
  margin-left: 4px;
  text-decoration: underline;
  text-underline-offset: 3px;
}
.resend-row button:disabled { color: var(--text-muted); cursor: not-allowed; text-decoration: none; }

.auth-footer {
  margin-top: 22px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}
.auth-footer a { color: var(--cyan); text-decoration: none; font-weight: 500; }
.auth-footer a:hover { text-decoration: underline; text-underline-offset: 3px; }

.hidden { display: none !important; }

@media (max-width: 480px) {
  .auth-card { padding: 28px 22px; }
  .back-home { top: 14px; left: 14px; }
}
</style>
  <link rel="stylesheet" href="/assets/css/theme.css" />
  <script>(function(){try{var t=localStorage.getItem('kempy-theme');if(t!=='light'&&t!=='dark'){t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
</head>
<body>

<a href="/auth/login.html" class="back-home">← Back to log in</a>

<div class="auth-shell">
  <div class="auth-card">
    <a href="/" class="auth-brand">KEMPY</a>

    <!-- ===== Step 1: request a code ===== -->
    <div id="step-request">
      <h1>Forgot your <span class="accent">password</span>?</h1>
      <p class="sub">Enter your account email and we'll send you a 6-digit reset code.</p>

      <form class="form" id="request-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required autofocus />
        </div>
        <div class="error-box" id="req-error"></div>
        <div class="ok-box" id="req-ok"></div>
        <button type="submit" class="auth-submit" id="request-btn">Send reset code</button>
      </form>

      <div class="auth-footer">
        Remembered it? <a href="/auth/login.html">Log in</a>
      </div>
    </div>

    <!-- ===== Step 2: enter code + new password ===== -->
    <div id="step-reset" class="hidden">
      <h1>Set a new <span class="accent">password</span>.</h1>
      <p class="sub">
        We sent a 6-digit code to<br>
        <span class="email" id="email-display"></span>
      </p>

      <form class="form" id="reset-form" novalidate>
        <div class="field">
          <label for="code">Reset code</label>
          <input type="text" id="code" name="code" class="code-input" inputmode="numeric" maxlength="6" placeholder="••••••" autocomplete="one-time-code" required />
        </div>
        <div class="field">
          <label for="password">New password</label>
          <input type="password" id="password" name="password" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8" />
        </div>
        <div class="field">
          <label for="password2">Confirm new password</label>
          <input type="password" id="password2" name="password2" placeholder="Re-enter password" autocomplete="new-password" required minlength="8" />
        </div>
        <div class="error-box" id="reset-error"></div>
        <button type="submit" class="auth-submit" id="reset-btn">Reset password</button>
      </form>

      <div class="resend-row">
        Didn't get it?
        <button id="resend-btn" type="button" disabled>Resend in <span id="resend-timer">60</span>s</button>
      </div>

      <div class="auth-footer">
        Wrong email? <a href="#" id="change-email">Use a different one</a>
      </div>
    </div>
  </div>
</div>

<script>
const stepRequest = document.getElementById('step-request');
const stepReset = document.getElementById('step-reset');
const requestForm = document.getElementById('request-form');
const resetForm = document.getElementById('reset-form');
const reqError = document.getElementById('req-error');
const reqOk = document.getElementById('req-ok');
const resetError = document.getElementById('reset-error');
const requestBtn = document.getElementById('request-btn');
const resetBtn = document.getElementById('reset-btn');

let pendingEmail = '';

function show(el, msg) { el.textContent = msg; el.classList.add('show'); }
function hide(el) { el.classList.remove('show'); }

// ---- Step 1: request code ----
requestForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  hide(reqError); hide(reqOk);
  const email = document.getElementById('email').value.trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    show(reqError, "That doesn't look like a valid email.");
    return;
  }
  requestBtn.disabled = true;
  requestBtn.textContent = 'Sending…';
  try {
    await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
  } catch (_) {
    // Even on network error we move forward — the response is intentionally opaque.
  }
  pendingEmail = email;
  document.getElementById('email-display').textContent = email;
  stepRequest.classList.add('hidden');
  stepReset.classList.remove('hidden');
  document.getElementById('code').focus();
  startCooldown();
});

// ---- Step 2: reset ----
document.getElementById('code').addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
});

resetForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  hide(resetError);
  const code = document.getElementById('code').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;

  if (code.length !== 6) { show(resetError, 'Enter the 6-digit code.'); return; }
  if (password.length < 8) { show(resetError, 'Password must be at least 8 characters.'); return; }
  if (password !== password2) { show(resetError, 'Passwords do not match.'); return; }

  resetBtn.disabled = true;
  resetBtn.textContent = 'Resetting…';
  try {
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: pendingEmail, code, password }),
    });
    if (r.ok) {
      window.location.href = '/auth/login.html?reset=1';
      return;
    }
    const d = await r.json().catch(() => ({}));
    resetBtn.disabled = false;
    resetBtn.textContent = 'Reset password';
    show(resetError, d.error || 'Could not reset password.');
  } catch (_) {
    resetBtn.disabled = false;
    resetBtn.textContent = 'Reset password';
    show(resetError, 'Network error — please try again.');
  }
});

// ---- Resend with 60s cooldown ----
const resendBtn = document.getElementById('resend-btn');
const resendTimer = document.getElementById('resend-timer');
let cooldownIv = null;
function startCooldown() {
  let cooldown = 60;
  resendBtn.disabled = true;
  resendTimer.textContent = cooldown;
  resendBtn.innerHTML = 'Resend in <span id="resend-timer">60</span>s';
  document.getElementById('resend-timer').textContent = cooldown;
  clearInterval(cooldownIv);
  cooldownIv = setInterval(() => {
    cooldown--;
    const t = document.getElementById('resend-timer');
    if (t) t.textContent = cooldown;
    if (cooldown <= 0) {
      clearInterval(cooldownIv);
      resendBtn.disabled = false;
      resendBtn.textContent = 'Resend code';
    }
  }, 1000);
}
resendBtn.addEventListener('click', async () => {
  if (!pendingEmail) return;
  hide(resetError);
  resendBtn.disabled = true;
  try {
    await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: pendingEmail }),
    });
  } catch (_) {}
  startCooldown();
});

document.getElementById('change-email').addEventListener('click', (e) => {
  e.preventDefault();
  clearInterval(cooldownIv);
  stepReset.classList.add('hidden');
  stepRequest.classList.remove('hidden');
  document.getElementById('email').focus();
});
</script>

<script src="/assets/js/theme.js"></script>
</body>
</html>
